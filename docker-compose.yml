# Taskify — full local stack: PostgreSQL (pgvector), Ollama, backend, frontend.
#
#   cp .env.example .env      # adjust secrets / models
#   make dev                  # build + start everything
#   make pull-models          # pull the Ollama models (first run)
#   open http://localhost:3000
#
# Values come from the root .env (see .env.example). The backend's DATABASE_URL
# and OLLAMA_BASE_URL are constructed here from those building blocks so they use
# the in-network service hostnames (postgres / ollama).

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taskuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskpass}
      POSTGRES_DB: ${POSTGRES_DB:-taskdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskuser} -d ${POSTGRES_DB:-taskdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # --- GPU passthrough (NVIDIA) ---------------------------------------------
    # Uncomment if the host has nvidia-container-toolkit installed. Left disabled
    # by default so `make dev` works on CPU-only machines (Ollama still runs on
    # CPU, just slower).
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-taskuser}:${POSTGRES_PASSWORD:-taskpass}@postgres:5432/${POSTGRES_DB:-taskdb}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_TOOL_MODEL: ${OLLAMA_TOOL_MODEL:-qwen3.5:9b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-insecure-change-me-in-production}
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:3000"]}'
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-false}
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
      # Declared for parity with the spec; the app proxies via BACKEND_URL.
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
